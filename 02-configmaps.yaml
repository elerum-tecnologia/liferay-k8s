apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-config
  namespace: liferay
data:
  elasticsearch.yml: |
    cluster.name: liferay-cluster
    node.name: liferay-es-0
    network.host: 0.0.0.0
    discovery.type: single-node
    xpack.security.enabled: false
    bootstrap.memory_lock: false
    http.max_content_length: 200mb

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: liferay-es-config
  namespace: liferay
data:
  com.liferay.portal.search.elasticsearch8.configuration.ElasticsearchConfiguration.config: |
    productionModeEnabled=B"true"
    networkHostAddresses=["http://liferay-elasticsearch:9200"]
    authenticationEnabled=B"false"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: liferay
data:
  nginx.conf: |
    worker_processes auto;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      upstream liferay {
        server liferay:8080;
        keepalive 32;
      }

      server {
        listen 80;
        server_name _;

        client_max_body_size 200m;
        proxy_buffering off;

        location = /healthz {
          return 200 "ok";
          add_header Content-Type text/plain;
        }

        location / {
          proxy_pass http://liferay;
          proxy_http_version 1.1;

          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto http;
          proxy_set_header X-Forwarded-Host $host;
          proxy_set_header X-Forwarded-Port 30080;

          proxy_connect_timeout 600;
          proxy_send_timeout 600;
          proxy_read_timeout 600;
          send_timeout 600;
        }
      }
    }
