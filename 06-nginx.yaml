apiVersion: apps/v1
kind: Deployment
metadata:
  name: liferay-nginx
  namespace: liferay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liferay-nginx
  template:
    metadata:
      labels:
        app: liferay-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: liferay-nginx
  namespace: liferay
spec:
  type: NodePort
  selector:
    app: liferay-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080