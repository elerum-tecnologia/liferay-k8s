AWSTemplateFormatVersion: '2010-09-09'
Description: Liferay DXP on Kubernetes (k3s) - Stack completa com PostgreSQL, Elasticsearch e nginx em EC2.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Instancia EC2"
        Parameters:
          - InstanceType
          - KeyName
          - AllowedHttpCidr
          - AllowedSshCidr
      - Label:
          default: "Liferay"
        Parameters:
          - LiferayImage
          - JvmMemory
          - LicenseXml
      - Label:
          default: "Banco de dados"
        Parameters:
          - DBPassword
      - Label:
          default: "Registry privada (opcional)"
        Parameters:
          - RegistryServer
          - RegistryUser
          - RegistryPassword
      - Label:
          default: "Storage"
        Parameters:
          - StorageType
          - S3Bucket
    ParameterLabels:
      InstanceType:
        default: "Tipo de instancia"
      KeyName:
        default: "Par de chaves SSH"
      AllowedHttpCidr:
        default: "CIDR com acesso HTTP (porta 30080)"
      AllowedSshCidr:
        default: "CIDR com acesso SSH"
      LiferayImage:
        default: "Imagem Docker do Liferay"
      JvmMemory:
        default: "Memoria maxima da JVM (ex: 4g)"
      LicenseXml:
        default: "Conteudo XML da licenca Liferay"
      DBPassword:
        default: "Senha do banco de dados"
      RegistryServer:
        default: "Servidor da registry (vazio para Docker Hub publico)"
      RegistryUser:
        default: "Usuario da registry"
      RegistryPassword:
        default: "Senha da registry"
      StorageType:
        default: "Tipo de storage (pvc ou s3)"
      S3Bucket:
        default: "Nome do bucket S3 (somente se StorageType=s3)"

Parameters:

  InstanceType:
    Type: String
    Default: t3.xlarge
    AllowedValues:
      - t3.xlarge
      - t3.2xlarge
      - m5.xlarge
      - m5.2xlarge
      - m6i.xlarge
      - m6i.2xlarge
    Description: "Minimo recomendado: t3.xlarge (4 vCPU / 16 GB RAM)"

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: "Par de chaves para acesso SSH"

  AllowedHttpCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: "CIDR com acesso ao Liferay (porta 30080)"

  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: "CIDR com acesso SSH (porta 22)"

  LiferayImage:
    Type: String
    Default: liferay/dxp:2026.q2.2
    Description: "Imagem Docker do Liferay"

  JvmMemory:
    Type: String
    Default: "4g"
    AllowedValues:
      - "2g"
      - "4g"
      - "6g"
      - "8g"
    Description: "Memoria maxima alocada para a JVM (-Xmx)"

  LicenseXml:
    Type: String
    Description: "Conteudo completo do arquivo activation-key.xml"

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: "Senha do PostgreSQL (minimo 8 caracteres)"

  RegistryServer:
    Type: String
    Default: ""
    Description: "URL da registry privada. Vazio para Docker Hub."

  RegistryUser:
    Type: String
    Default: ""
    Description: "Usuario da registry privada"

  RegistryPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Senha da registry privada"

  StorageType:
    Type: String
    Default: pvc
    AllowedValues:
      - pvc
      - s3
    Description: "pvc = EBS local | s3 = Amazon S3"

  S3Bucket:
    Type: String
    Default: ""
    Description: "Bucket S3 para documentos (somente se StorageType=s3)"

Mappings:
  AmiByRegion:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-07e7171f06bfc1539
    us-west-1:
      AMI: ami-0ce2cb35386fc22e9
    us-west-2:
      AMI: ami-008fe2fc65df48dac
    eu-west-1:
      AMI: ami-0905a3c97561e0b69
    eu-central-1:
      AMI: ami-0faab6bdbac9486fb
    ap-southeast-1:
      AMI: ami-078c1149d8ad719a7
    ap-northeast-1:
      AMI: ami-0d52744d6551d851e
    sa-east-1:
      AMI: ami-0af6e9042ea5a4e3e

Resources:

  LiferaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Liferay DXP - acesso HTTP e SSH"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 30080
          ToPort: 30080
          CidrIp: !Ref AllowedHttpCidr
          Description: "Liferay HTTP"
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
          Description: "SSH"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  LiferayInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LiferayS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}"
                  - !Sub "arn:aws:s3:::${S3Bucket}/*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  LiferayInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref LiferayInstanceRole

  LiferayInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AmiByRegion, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref LiferayInstanceProfile
      SecurityGroupIds:
        - !GetAtt LiferaySecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 60
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-liferay"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/liferay-setup.log 2>&1

          export DB_PASSWORD='${DBPassword}'
          export LIFERAY_IMAGE='${LiferayImage}'
          export REGISTRY_SERVER='${RegistryServer}'
          export REGISTRY_USER='${RegistryUser}'
          export REGISTRY_PASSWORD='${RegistryPassword}'
          export STORAGE_TYPE='${StorageType}'
          export S3_BUCKET='${S3Bucket}'
          export JVM_MEMORY='${JvmMemory}'
          export LICENSE_XML='${LicenseXml}'

          curl -sf https://raw.githubusercontent.com/elerum-tecnologia/liferay-k8s/main/userdata.sh | bash

Outputs:

  LiferayURL:
    Description: "URL de acesso ao Liferay"
    Value: !Sub "http://${LiferayInstance.PublicIp}:30080"

  PublicIP:
    Description: "IP publico da instancia EC2"
    Value: !GetAtt LiferayInstance.PublicIp

  SSHCommand:
    Description: "Comando SSH"
    Value: !Sub "ssh -i <sua-chave>.pem ubuntu@${LiferayInstance.PublicIp}"

  DefaultLogin:
    Description: "Usuario padrao do Liferay"
    Value: "admin@liferay.com"

  DefaultPassword:
    Description: "Senha padrao do Liferay (altere apos o primeiro acesso)"
    Value: "admin"

  SetupLog:
    Description: "Log de instalacao (dentro da instancia)"
    Value: "sudo tail -f /var/log/liferay-setup.log"
