apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: liferay-data
  namespace: liferay
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liferay
  namespace: liferay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liferay
  template:
    metadata:
      labels:
        app: liferay
    spec:
      securityContext:
        fsGroup: 1000

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z liferay-database 5432; do echo waiting for postgres; sleep 5; done"]
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z liferay-elasticsearch 9200; do echo waiting for elasticsearch; sleep 5; done"]
        - name: copy-license
          image: busybox:1.36
          command: ["sh", "-c", "cp /license/activation-key.xml /deploy/ && chmod -R 777 /deploy"]
          volumeMounts:
            - name: liferay-license
              mountPath: /license
            - name: deploy-dir
              mountPath: /deploy

      containers:
        - name: liferay
          image: elupianhez/lug-liferay:2026.q2.2
          imagePullPolicy: IfNotPresent
          env:
            - name: LIFERAY_JVM_OPTS
              value: "-Xms2g -Xmx4g -XX:+UseG1GC"
            - name: JAVA_VERSION
              value: "zulu21"
            - name: jdbc_database
              valueFrom:
                secretKeyRef:
                  name: liferay-secret
                  key: DATABASE
            - name: jdbc_default_username
              valueFrom:
                secretKeyRef:
                  name: liferay-secret
                  key: DB_USER
            - name: jdbc_default_password
              valueFrom:
                secretKeyRef:
                  name: liferay-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: liferay-data
              mountPath: /opt/liferay/data
            - name: deploy-dir
              mountPath: /opt/liferay/deploy
            - name: portal-ext
              mountPath: /opt/liferay/portal-ext.properties
              subPath: portal-ext.properties
            - name: es-config
              mountPath: /opt/liferay/osgi/configs/com.liferay.portal.search.elasticsearch8.configuration.ElasticsearchConfiguration.config
              subPath: com.liferay.portal.search.elasticsearch8.configuration.ElasticsearchConfiguration.config
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "6Gi"

      volumes:
        - name: liferay-data
          persistentVolumeClaim:
            claimName: liferay-data
        - name: liferay-license
          configMap:
            name: liferay-license
        - name: deploy-dir
          emptyDir: {}
        - name: portal-ext
          configMap:
            name: liferay-portal-ext
        - name: es-config
          configMap:
            name: liferay-es-config
---
apiVersion: v1
kind: Service
metadata:
  name: liferay
  namespace: liferay
spec:
  selector:
    app: liferay
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - name: http
      port: 8080
      targetPort: 8080
